<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ec27e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26a269;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield shape - larger, fills more of the canvas -->
  <path d="M 11 0 L 1 3.5 L 1 9.5 C 1 15.5 5 20 11 22 C 17 20 21 15.5 21 9.5 L 21 3.5 Z" 
        fill="url(#shieldGrad)" />
  <!-- Lock body -->
  <rect x="7" y="10" width="8" height="6" rx="0.8" fill="white" />
  <!-- Lock shackle -->
  <path d="M 8.5 10 L 8.5 7.5 C 8.5 5.5 9.5 4 11 4 C 12.5 4 13.5 5.5 13.5 7.5 L 13.5 10" 
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
  <!-- Keyhole -->
  <circle cx="11" cy="12.5" r="1" fill="#26a269" />
  <rect x="10.4" y="13" width="1.2" height="2" fill="#26a269" />
</svg>
