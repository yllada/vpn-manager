name: Build Snap Package

on:
  push:
    branches: [main]
    paths:
      - 'snap/**'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'assets/**'
  pull_request:
    branches: [main]
    paths:
      - 'snap/**'
      - '**.go'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_edge:
        description: 'Publish to edge channel'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      snap-file: ${{ steps.build.outputs.snap }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-manager-snap
          path: ${{ steps.build.outputs.snap }}
          retention-days: 7

  # Test the snap in a clean environment
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download snap
        uses: actions/download-artifact@v4
        with:
          name: vpn-manager-snap

      - name: Install snap
        run: |
          sudo snap install --dangerous vpn-manager_*.snap
          
      - name: Test CLI
        run: |
          vpn-manager --version
          vpn-manager --help

      - name: Check snap info
        run: |
          snap info vpn-manager
          snap connections vpn-manager

  # Publish to edge channel on release or manual trigger
  publish-edge:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.publish_edge == 'true'
    steps:
      - name: Download snap
        uses: actions/download-artifact@v4
        with:
          name: vpn-manager-snap

      - name: Setup Snapcraft
        run: |
          sudo snap install snapcraft --classic

      - name: Upload to Snap Store (edge channel)
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          snapcraft upload --release=edge *.snap
