# =============================================================================
# VPN Manager - Security Analysis
# =============================================================================
# Comprehensive security scanning pipeline:
#   - CodeQL:      GitHub's semantic code analysis (SAST)
#   - govulncheck: Go vulnerability database scanning
#   - Licenses:    Dependency license compliance
#
# Schedule: Weekly (Monday 6:00 UTC) + on push/PR to main
#
# Optimizations:
#   - APT caching for CodeQL job (requires CGO)
#   - No CGO deps for govulncheck/license-check (pure analysis)
#   - Parallel execution of all jobs
#
# Documentation: https://docs.github.com/en/code-security/code-scanning
# =============================================================================

name: Security

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    # Run every Monday at 6:00 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # =============================================================================
  # CodeQL Analysis - Semantic code analysis (requires CGO for Go build)
  # =============================================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go and GTK
        uses: ./.github/actions/setup-go-gtk

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"

  # =============================================================================
  # Vulnerability Check - Go vulnerability database (NO CGO needed)
  # =============================================================================
  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # NOTE: No GTK deps needed - govulncheck analyzes code, doesn't compile
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
        env:
          CGO_ENABLED: 0

  # =============================================================================
  # License Check - Dependency license compliance (NO CGO needed)
  # =============================================================================
  license-check:
    name: License Check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # NOTE: No GTK deps needed - license scanning is pure Go analysis
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Check licenses
        run: |
          echo "📋 Checking dependency licenses..."
          go-licenses report ./... 2>/dev/null || true
          
          # Check for problematic licenses
          echo ""
          echo "🔍 Scanning for potentially incompatible licenses..."
          PROBLEMATIC=$(go-licenses report ./... 2>/dev/null | grep -iE "(GPL|AGPL|SSPL)" || true)
          
          if [ -n "$PROBLEMATIC" ]; then
            echo "::warning::Found dependencies with GPL-family licenses:"
            echo "$PROBLEMATIC"
            echo ""
            echo "Review these for MIT compatibility."
          else
            echo "✅ No GPL-family licenses detected"
          fi
