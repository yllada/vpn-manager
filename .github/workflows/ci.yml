# =============================================================================
# VPN Manager - Continuous Integration
# =============================================================================
# Fast, single-job CI pipeline for Go + GTK4 projects.
#
# Architecture Decision (based on GitHub Actions best practices):
#   - Single job with sequential steps: lint → test → build
#   - Why? One setup of Go+GTK instead of 3 parallel setups
#   - Result: Faster total time, less resource usage
#
# Optimizations:
#   - APT package caching (~60s → ~5s)
#   - Go module caching (via setup-go)
#   - golangci-lint binary install (not goinstall)
#   - Race detector only on PRs (10-20x slower)
#   - only-new-issues on PRs (faster feedback)
#
# Documentation: https://docs.github.com/en/actions
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Must be compatible with Go version in go.mod (currently 1.26.2)
  # Check releases: https://github.com/golangci/golangci-lint/releases
  GOLANGCI_LINT_VERSION: 'v2.11'

permissions:
  contents: read

jobs:
  # =============================================================================
  # CI - Single job: lint → test → build
  # =============================================================================
  ci:
    name: Lint → Test → Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go and GTK
        uses: ./.github/actions/setup-go-gtk

      # -------------------------------------------------------------------------
      # Pre-compilation warm-up (critical for CGO projects)
      # -------------------------------------------------------------------------
      # golangci-lint calls go/packages.Load() which must compile all deps.
      # For gotk4, this takes 5-8 minutes on cold cache and causes timeouts.
      # Running go build first warms the cache so lint starts with hot cache.
      # -------------------------------------------------------------------------
      - name: Warm up Go build cache
        run: |
          echo "🔥 Pre-compiling dependencies (gotk4 CGO bindings)..."
          go build ./...
        env:
          CGO_ENABLED: 1

      # -------------------------------------------------------------------------
      # Lint
      # -------------------------------------------------------------------------
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-mode: binary
          # 15m timeout: gotk4 CGO bindings may still need time on cold cache
          # This matches the timeout in .golangci.yaml
          args: --timeout=15m
          # On PRs: only report new issues (faster feedback)
          only-new-issues: ${{ github.event_name == 'pull_request' }}
          # On PRs: don't pollute cache
          skip-save-cache: ${{ github.event_name == 'pull_request' }}

      # -------------------------------------------------------------------------
      # Test
      # -------------------------------------------------------------------------
      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "🔍 Running tests WITH race detector (PR)"
            go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          else
            echo "⚡ Running tests WITHOUT race detector (push)"
            go test -v -coverprofile=coverage.out -covermode=atomic ./...
          fi
        env:
          CGO_ENABLED: 1

      - name: Display coverage summary
        run: |
          echo "📊 Coverage Summary:"
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

      # -------------------------------------------------------------------------
      # Build
      # -------------------------------------------------------------------------
      - name: Build GUI application
        run: |
          CGO_ENABLED=1 go build -v -trimpath \
            -ldflags="-s -w \
              -X main.appVersion=ci-${{ github.sha }} \
              -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              -X main.commitSHA=${{ github.sha }}" \
            -o vpn-manager ./cmd/vpn-manager

      - name: Build daemon
        run: |
          CGO_ENABLED=1 go build -v -trimpath \
            -ldflags="-s -w" \
            -o vpn-managerd ./cmd/vpn-managerd

      - name: Verify binaries
        run: |
          echo "📦 GUI Application:"
          file vpn-manager
          
          # Check if binary runs (will exit 0 if --version works, non-zero if crash)
          if ./vpn-manager --version 2>&1; then
            echo "✅ Binary executes successfully"
          else
            EXIT_CODE=$?
            echo "::warning::Binary exited with code $EXIT_CODE (version flag may not be implemented)"
          fi
          
          echo ""
          echo "📦 Daemon:"
          file vpn-managerd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vpn-manager-ci-${{ github.sha }}
          path: |
            vpn-manager
            vpn-managerd
          retention-days: 7
