# =============================================================================
# VPN Manager - Continuous Integration
# =============================================================================
# Runs on every push and pull request to ensure code quality:
# - Build verification
# - Unit tests with coverage
# - Code quality (golangci-lint)
# - Race condition detection
#
# Designed for simplicity and speed while maintaining quality.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'
  GOLANGCI_LINT_VERSION: 'v2.1'

permissions:
  contents: read

jobs:
  # =============================================================================
  # Lint - Fast feedback on code style
  # =============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libayatana-appindicator3-dev \
            libgirepository1.0-dev \
            pkg-config

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  # =============================================================================
  # Test - Unit tests with coverage and race detection
  # =============================================================================
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libayatana-appindicator3-dev \
            libgirepository1.0-dev \
            pkg-config

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          CGO_ENABLED: 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

      - name: Display coverage summary
        run: |
          echo "📊 Coverage Summary:"
          go tool cover -func=coverage.out | tail -1

  # =============================================================================
  # Build - Ensure the application compiles
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libayatana-appindicator3-dev \
            libgirepository1.0-dev \
            pkg-config

      - name: Download dependencies
        run: go mod download

      - name: Build application
        run: |
          CGO_ENABLED=1 go build -v -trimpath \
            -ldflags="-s -w \
              -X main.appVersion=ci-${{ github.sha }} \
              -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              -X main.commitSHA=${{ github.sha }}" \
            -o vpn-manager .

      - name: Verify binary
        run: |
          file vpn-manager
          ./vpn-manager --version || echo "Version flag may not be implemented"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-manager-ci-${{ github.sha }}
          path: vpn-manager
          retention-days: 7
