# =============================================================================
# VPN Manager - Continuous Integration
# =============================================================================
# Fast, parallelized CI pipeline for Go + GTK4 projects.
#
# Jobs (all run in PARALLEL for speed):
#   - lint:  Code quality via golangci-lint
#   - test:  Unit tests with race detection and coverage
#   - build: Compilation verification
#
# Optimizations:
#   - APT package caching (~60s → ~5s)
#   - Go module caching (via setup-go)
#   - Parallel job execution (12min → 5min wall-clock)
#   - Go version from go.mod (single source of truth)
#
# Documentation: https://docs.github.com/en/actions
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOLANGCI_LINT_VERSION: 'v2.1'

permissions:
  contents: read

jobs:
  # =============================================================================
  # Lint - Code quality checks
  # =============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go and GTK
        uses: ./.github/actions/setup-go-gtk

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-mode: goinstall
          args: --timeout=15m

  # =============================================================================
  # Test - Unit tests with coverage and race detection
  # =============================================================================
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go and GTK
        uses: ./.github/actions/setup-go-gtk

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          CGO_ENABLED: 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

      - name: Display coverage summary
        run: |
          echo "📊 Coverage Summary:"
          go tool cover -func=coverage.out | tail -1

  # =============================================================================
  # Build - Compilation verification (runs in parallel, not sequential)
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # NOTE: No 'needs' - runs in parallel with lint/test for faster feedback
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go and GTK
        uses: ./.github/actions/setup-go-gtk

      - name: Build GUI application
        run: |
          CGO_ENABLED=1 go build -v -trimpath \
            -ldflags="-s -w \
              -X main.appVersion=ci-${{ github.sha }} \
              -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              -X main.commitSHA=${{ github.sha }}" \
            -o vpn-manager ./cmd/vpn-manager

      - name: Build daemon
        run: |
          CGO_ENABLED=1 go build -v -trimpath \
            -ldflags="-s -w" \
            -o vpn-managerd ./cmd/vpn-managerd

      - name: Verify binaries
        run: |
          echo "📦 GUI Application:"
          file vpn-manager
          ./vpn-manager --version || echo "Version flag may not be implemented"
          
          echo ""
          echo "📦 Daemon:"
          file vpn-managerd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vpn-manager-ci-${{ github.sha }}
          path: |
            vpn-manager
            vpn-managerd
          retention-days: 7
