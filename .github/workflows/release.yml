# =============================================================================
# VPN Manager - Release Workflow
# =============================================================================
# Automated release pipeline following DevOps best practices
# - Triggers on semantic version tags (v*.*.*)
# - Validates version format and changelog
# - Builds and tests before release
# - Generates categorized changelog from Conventional Commits
# - Creates GitHub Release with artifacts
#
# Documentation: https://docs.github.com/en/actions
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip release creation)'
        required: false
        default: false
        type: boolean

# Prevent concurrent releases - never cancel in-progress releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.1'
  APP_NAME: 'vpn-manager'
  # Cache keys for reproducibility
  APT_CACHE_VERSION: 'v2'

# Minimal permissions at workflow level - jobs override as needed
permissions:
  contents: read

jobs:
  # =============================================================================
  # Validate - Ensure release requirements are met
  # =============================================================================
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      version_major: ${{ steps.version.outputs.major }}
      version_minor: ${{ steps.version.outputs.minor }}
      version_patch: ${{ steps.version.outputs.patch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract and validate version
        id: version
        run: |
          # Extract version from tag or use workflow input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="0.0.0-dry-run"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          
          # Validate strict semver format (X.Y.Z or X.Y.Z-prerelease)
          SEMVER_REGEX='^([0-9]+)\.([0-9]+)\.([0-9]+)(-([a-zA-Z]+)\.?([0-9]+)?)?$'
          if ! [[ "$VERSION" =~ $SEMVER_REGEX ]]; then
            echo "::error::Invalid semver format: $VERSION. Expected: X.Y.Z or X.Y.Z-alpha.1"
            exit 1
          fi
          
          # Extract components
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          PRERELEASE="${BASH_REMATCH[5]}"
          
          # Determine if prerelease
          if [[ -n "$PRERELEASE" ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          
          # Export outputs
          {
            echo "version=$VERSION"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "major=$MAJOR"
            echo "minor=$MINOR"
            echo "patch=$PATCH"
          } >> "$GITHUB_OUTPUT"
          
          echo "📦 Release version: $VERSION"
          echo "   Major: $MAJOR, Minor: $MINOR, Patch: $PATCH"
          echo "   Prerelease: $IS_PRERELEASE"

      - name: Verify changelog entry
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          if [[ -f "changelog" ]]; then
            if grep -q "$VERSION" changelog; then
              echo "✅ Version $VERSION found in changelog"
            else
              echo "::warning::Version $VERSION not found in changelog"
              echo "Consider documenting changes before release"
            fi
          else
            echo "::notice::No changelog file found - will auto-generate from commits"
          fi

      - name: Verify main.go version consistency
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Check if main.go has version variable
          if grep -qE "appVersion\s*=\s*\"$VERSION\"" main.go 2>/dev/null; then
            echo "✅ Version matches main.go"
          else
            echo "::notice::Version in main.go may differ (will be set via ldflags)"
          fi

  # =============================================================================
  # Build Release Artifacts
  # =============================================================================
  build:
    name: Build Release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: validate
    outputs:
      version: ${{ needs.validate.outputs.version }}
      artifact_name: ${{ steps.names.outputs.artifact_name }}
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Define artifact names
        id: names
        run: |
          echo "artifact_name=release-${{ env.VERSION }}" >> "$GITHUB_OUTPUT"
          echo "tarball=${{ env.APP_NAME }}-${{ env.VERSION }}-linux-amd64.tar.gz" >> "$GITHUB_OUTPUT"
          echo "deb=${{ env.APP_NAME }}_${{ env.VERSION }}_amd64.deb" >> "$GITHUB_OUTPUT"
          echo "rpm=${{ env.APP_NAME }}-${{ env.VERSION }}-1.x86_64.rpm" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            go.mod

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: >-
            libgtk-4-dev
            libadwaita-1-dev
            libayatana-appindicator3-dev
            libgirepository1.0-dev
            pkg-config
            gcc
            dpkg-dev
            rpm
            desktop-file-utils
          version: ${{ env.APT_CACHE_VERSION }}

      - name: Download and verify Go dependencies
        run: |
          echo "📦 Downloading Go dependencies..."
          go mod download -x
          
          echo "✅ Verifying go.sum integrity..."
          go mod verify
          
          echo "🔍 Checking for missing/extra dependencies..."
          if ! go mod tidy -diff > /dev/null 2>&1; then
            echo "::error::go.sum is out of sync. Run 'go mod tidy' locally and commit the changes."
            go mod tidy -diff || true
            exit 1
          fi
          echo "✅ Dependencies verified"

      - name: Verify build environment
        run: |
          echo "📋 Build environment:"
          echo "  Go: $(go version)"
          echo "  GTK4: $(pkg-config --modversion gtk4)"
          pkg-config --exists gtk4 libadwaita-1
          echo "✅ All dependencies available"

      # - name: Run tests
      #   run: |
      #     echo "🧪 Running test suite..."
      #     go test -race -coverprofile=coverage.out -covermode=atomic ./...
          
      #     # Report coverage
      #     COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
      #     echo "📊 Test coverage: $COVERAGE"
          
      #     # Fail if coverage is too low (optional threshold)
      #     # THRESHOLD=50
      #     # if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
      #     #   echo "::error::Coverage $COVERAGE is below threshold $THRESHOLD%"
      #     #   exit 1
      #     # fi

      - name: Build binary
        env:
          GOFLAGS: "-buildvcs=false"
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_SHA="${GITHUB_SHA::8}"
          
          echo "🔨 Building ${{ env.APP_NAME }} v${{ env.VERSION }}..."
          
          # Use all available CPUs for parallel compilation
          CGO_ENABLED=1 go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.appVersion=${{ env.VERSION }} \
              -X main.buildTime=${BUILD_TIME} \
              -X main.commitSHA=${COMMIT_SHA}" \
            -o "${{ env.APP_NAME }}" \
            .
          
          # Verify binary
          file "${{ env.APP_NAME }}"
          ./${{ env.APP_NAME }} --version || true

      - name: Create distribution directory
        run: mkdir -p dist

      - name: Create tarball
        run: |
          TARBALL_DIR="${{ env.APP_NAME }}-${{ env.VERSION }}"
          mkdir -p "dist/${TARBALL_DIR}"
          
          # Copy files
          cp "${{ env.APP_NAME }}" "dist/${TARBALL_DIR}/"
          cp README.md LICENSE "dist/${TARBALL_DIR}/" 2>/dev/null || true
          cp -r assets "dist/${TARBALL_DIR}/" 2>/dev/null || true
          
          # Create install script
          cat > "dist/${TARBALL_DIR}/install.sh" << 'INSTALL_EOF'
          #!/bin/bash
          set -euo pipefail
          
          echo "🚀 Installing VPN Manager..."
          
          # Check for root/sudo
          if [[ $EUID -ne 0 ]]; then
            SUDO="sudo"
          else
            SUDO=""
          fi
          
          # Install binary
          $SUDO install -Dm755 vpn-manager /usr/local/bin/vpn-manager
          
          # Install desktop file
          if [[ -f assets/vpn-manager.desktop ]]; then
            $SUDO install -Dm644 assets/vpn-manager.desktop /usr/share/applications/vpn-manager.desktop
          fi
          
          # Install icons
          if [[ -d assets/icons ]]; then
            $SUDO cp -r assets/icons/* /usr/share/icons/ 2>/dev/null || true
            $SUDO gtk-update-icon-cache /usr/share/icons/hicolor 2>/dev/null || true
          fi
          
          echo "✅ VPN Manager installed successfully!"
          echo "   Run: vpn-manager"
          INSTALL_EOF
          chmod +x "dist/${TARBALL_DIR}/install.sh"
          
          # Create tarball
          cd dist
          tar -czvf "${{ steps.names.outputs.tarball }}" "${TARBALL_DIR}"
          echo "📦 Created: ${{ steps.names.outputs.tarball }}"

      - name: Build DEB package
        run: |
          chmod +x scripts/build-deb.sh
          # Pass pre-built binary to avoid recompilation
          ./scripts/build-deb.sh "${{ env.VERSION }}" "./${{ env.APP_NAME }}"
          
          # Move DEB to dist directory for consistency
          mv "${{ env.APP_NAME }}_${{ env.VERSION }}_amd64.deb" dist/ 2>/dev/null || \
            mv *.deb dist/ 2>/dev/null || true
          
          echo "📦 DEB package:"
          ls -la dist/*.deb

      - name: Build RPM package
        run: |
          chmod +x scripts/build-rpm.sh
          # Pass pre-built binary to avoid recompilation
          ./scripts/build-rpm.sh "${{ env.VERSION }}" "./${{ env.APP_NAME }}"
          
          # Move RPM to dist directory for consistency
          mv "${{ env.APP_NAME }}-${{ env.VERSION }}-1.x86_64.rpm" dist/ 2>/dev/null || \
            mv *.rpm dist/ 2>/dev/null || true
          
          echo "📦 RPM package:"
          ls -la dist/*.rpm

      - name: Generate checksums
        run: |
          cd dist
          
          echo "📋 Generating SHA256 checksums..."
          sha256sum *.tar.gz *.deb *.rpm > checksums-sha256.txt
          
          echo "Checksums:"
          cat checksums-sha256.txt

      - name: Verify artifacts
        run: |
          echo "🔍 Verifying release artifacts..."
          
          EXPECTED_FILES=(
            "dist/${{ steps.names.outputs.tarball }}"
            "dist/${{ steps.names.outputs.deb }}"
            "dist/${{ steps.names.outputs.rpm }}"
            "dist/checksums-sha256.txt"
          )
          
          for file in "${EXPECTED_FILES[@]}"; do
            if [[ -f "$file" ]]; then
              SIZE=$(du -h "$file" | cut -f1)
              echo "✅ $file ($SIZE)"
            else
              echo "::error::Missing artifact: $file"
              exit 1
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.names.outputs.artifact_name }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/checksums-sha256.txt
          retention-days: 30
          if-no-files-found: error

  # =============================================================================
  # Create GitHub Release with Categorized Changelog
  # =============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, build]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "📦 Downloaded artifacts:"
          find artifacts -type f -exec ls -la {} \;

      - name: Generate categorized changelog
        id: changelog
        run: |
          # Find previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Generate changelog header
          {
            echo "## What's Changed in v${{ env.VERSION }}"
            echo ""
          } > release-notes.md
          
          # Determine commit range
          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..HEAD"
            echo "📝 Generating changelog from $PREV_TAG to HEAD"
          else
            RANGE="HEAD~100..HEAD"
            echo "📝 Generating changelog for initial release"
          fi
          
          # Function to extract commits by category
          extract_commits() {
            local pattern="$1"
            local header="$2"
            local emoji="$3"
            
            local commits
            commits=$(git log "$RANGE" --pretty=format:"%s (%h)" --no-merges 2>/dev/null | \
              grep -iE "^${pattern}" | \
              sed -E "s/^(${pattern})[:(]?\s*/- /" | \
              head -20) || true
            
            if [[ -n "$commits" ]]; then
              echo "### ${emoji} ${header}"
              echo "$commits"
              echo ""
            fi
          }
          
          # Extract and categorize commits
          {
            extract_commits "feat|feature" "Features" "✨"
            extract_commits "fix|bugfix|hotfix" "Bug Fixes" "🐛"
            extract_commits "perf|performance" "Performance" "⚡"
            extract_commits "refactor" "Refactoring" "♻️"
            extract_commits "docs?" "Documentation" "📚"
            extract_commits "test" "Tests" "🧪"
            extract_commits "security|sec" "Security" "🔒"
            extract_commits "ci|cd|build|workflow" "CI/CD" "🔄"
            extract_commits "chore\(deps\)|deps?|bump" "Dependencies" "📦"
          } >> release-notes.md
          
          # Add other commits that don't match categories
          OTHER_COMMITS=$(git log "$RANGE" --pretty=format:"%s (%h)" --no-merges 2>/dev/null | \
            grep -viE "^(feat|feature|fix|bugfix|hotfix|perf|performance|refactor|docs?|test|security|sec|ci|cd|build|workflow|chore|deps?|bump)" | \
            sed 's/^/- /' | \
            head -10) || true
          
          if [[ -n "$OTHER_COMMITS" ]]; then
            {
              echo "### 📝 Other Changes"
              echo "$OTHER_COMMITS"
              echo ""
            } >> release-notes.md
          fi
          
          # Add installation section
          {
            echo "---"
            echo ""
            echo "## 📥 Installation"
            echo ""
            echo "### DEB Package (Debian/Ubuntu)"
            echo '```bash'
            echo "wget https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/${{ env.APP_NAME }}_${{ env.VERSION }}_amd64.deb"
            echo "sudo dpkg -i ${{ env.APP_NAME }}_${{ env.VERSION }}_amd64.deb"
            echo '```'
            echo ""
            echo "### RPM Package (Fedora/RHEL)"
            echo '```bash'
            echo "wget https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/${{ env.APP_NAME }}-${{ env.VERSION }}-1.x86_64.rpm"
            echo "sudo dnf install ./${{ env.APP_NAME }}-${{ env.VERSION }}-1.x86_64.rpm"
            echo '```'
            echo ""
            echo "### Tarball (Arch/Other)"
            echo '```bash'
            echo "wget https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/${{ env.APP_NAME }}-${{ env.VERSION }}-linux-amd64.tar.gz"
            echo "tar -xzf ${{ env.APP_NAME }}-${{ env.VERSION }}-linux-amd64.tar.gz"
            echo "cd ${{ env.APP_NAME }}-${{ env.VERSION }} && ./install.sh"
            echo '```'
            echo ""
            echo "### Verify Checksums"
            echo '```bash'
            echo "sha256sum -c checksums-sha256.txt"
            echo '```'
            echo ""
          } >> release-notes.md
          
          # Add compare link if previous tag exists
          if [[ -n "$PREV_TAG" ]]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${{ env.VERSION }}" >> release-notes.md
          fi
          
          echo "📋 Generated release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VPN Manager v${{ env.VERSION }}"
          tag_name: "v${{ env.VERSION }}"
          draft: false
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          body_path: release-notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/checksums-sha256.txt
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "## 🎉 Release Created Successfully!" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** v${{ env.VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Prerelease:** ${{ needs.validate.outputs.is_prerelease }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.APP_NAME }}-${{ env.VERSION }}-linux-amd64.tar.gz\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.APP_NAME }}_${{ env.VERSION }}_amd64.deb\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.APP_NAME }}-${{ env.VERSION }}-1.x86_64.rpm\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`checksums-sha256.txt\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION }})" >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # Update APT Repository for automatic updates via apt upgrade
  # =============================================================================
  update-apt-repo:
    name: Update APT Repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, build, release]
    if: ${{ github.event.inputs.dry_run != 'true' && needs.validate.outputs.is_prerelease != 'true' }}
    permissions:
      contents: write
      actions: write  # Required to trigger Pages workflow
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main  # Checkout main branch, not the tag (avoids detached HEAD)
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: artifacts

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gpg

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          
          # Trust the key using fingerprint
          FINGERPRINT=$(gpg --list-keys --with-colons "VPN Manager APT Repository" | grep fpr | head -1 | cut -d: -f10)
          echo "${FINGERPRINT}:6:" | gpg --import-ownertrust
          
          echo "✅ GPG key imported and trusted (fingerprint: $FINGERPRINT)"

      - name: Update APT repository
        run: |
          chmod +x scripts/update-apt-repo.sh
          
          # Find the .deb file
          DEB_FILE=$(find artifacts -name "*.deb" | head -1)
          
          if [[ -z "$DEB_FILE" ]]; then
            echo "::error::No .deb file found in artifacts"
            exit 1
          fi
          
          echo "📦 Updating APT repo with: $DEB_FILE"
          ./scripts/update-apt-repo.sh "$DEB_FILE"

      - name: Commit and push APT repository changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/apt/
          
          if git diff --staged --quiet; then
            echo "No changes to APT repository"
            echo "apt_updated=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(apt): update repository for v${{ env.VERSION }}"
            git push
            echo "✅ APT repository updated and pushed"
            echo "apt_updated=true" >> "$GITHUB_OUTPUT"
          fi
        id: commit

      - name: Trigger GitHub Pages deployment
        if: steps.commit.outputs.apt_updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Triggering GitHub Pages deployment..."
          gh workflow run pages.yml --ref main
          echo "✅ Pages deployment triggered"

      - name: APT Repository summary
        run: |
          echo "## 📦 APT Repository Updated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version **v${{ env.VERSION }}** is now available via apt!" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Installation" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "# Add repository (one-time setup)" >> "$GITHUB_STEP_SUMMARY"
          echo "curl -fsSL https://yllada.github.io/vpn-manager/apt/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/vpn-manager.gpg" >> "$GITHUB_STEP_SUMMARY"
          echo 'echo "deb [signed-by=/usr/share/keyrings/vpn-manager.gpg] https://yllada.github.io/vpn-manager/apt stable main" | sudo tee /etc/apt/sources.list.d/vpn-manager.list' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Install/Update" >> "$GITHUB_STEP_SUMMARY"
          echo "sudo apt update && sudo apt install vpn-manager" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # Post-Release Verification (optional)
  # =============================================================================
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate, release]
    if: ${{ needs.validate.outputs.is_prerelease != 'true' }}
    steps:
      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Verifying release v${{ needs.validate.outputs.version }}..."
          
          # Wait for release to propagate
          sleep 5
          
          # Check release exists
          RELEASE_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ needs.validate.outputs.version }}"
          
          if curl -sf -H "Authorization: token $GH_TOKEN" "$RELEASE_URL" > /dev/null; then
            echo "✅ Release published successfully"
            
            # List assets
            echo "📦 Release assets:"
            curl -sf -H "Authorization: token $GH_TOKEN" "$RELEASE_URL" | \
              jq -r '.assets[] | "  - \(.name) (\(.size | . / 1048576 | floor)MB)"'
          else
            echo "::error::Release not found"
            exit 1
          fi
