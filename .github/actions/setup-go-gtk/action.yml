# =============================================================================
# Composite Action: Setup Go with GTK Dependencies
# =============================================================================
# Reusable action that sets up Go and GTK4 dependencies with caching.
# Eliminates duplication across workflows and ensures consistency.
#
# Usage:
#   - name: Setup Go and GTK
#     uses: ./.github/actions/setup-go-gtk
#     with:
#       go-version-file: 'go.mod'  # Optional, defaults to go.mod
#
# Performance optimizations:
#   - APT package caching: ~60s → ~5s
#   - Go build cache: CGO compilation artifacts cached across runs
#     (gotk4 bindings take 60-120s to compile from scratch)
#
# Note: actions/setup-go caches modules (~/go/pkg/mod) but NOT the build
# cache (~/.cache/go-build). We cache it explicitly for CGO projects.
# =============================================================================

name: 'Setup Go with GTK'
description: 'Setup Go and GTK4 dependencies with caching for CGO projects'

inputs:
  go-version-file:
    description: 'Path to go.mod or .go-version file'
    required: false
    default: 'go.mod'
  install-gtk:
    description: 'Whether to install GTK dependencies (set to false for non-CGO jobs)'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache: true

    - name: Cache APT packages
      if: inputs.install-gtk == 'true'
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        packages: >-
          libgtk-4-dev
          libadwaita-1-dev
          libayatana-appindicator3-dev
          libgirepository1.0-dev
          pkg-config
        version: v2

    # -------------------------------------------------------------------------
    # Go Build Cache (CGO compilation artifacts)
    # -------------------------------------------------------------------------
    # actions/setup-go caches modules but NOT build artifacts.
    # For CGO projects like gotk4, the gcc invocations are the bottleneck.
    # This cache stores compiled .a files, reducing rebuild time by 30-50%.
    #
    # Key strategy:
    #   - Primary: OS + go.sum hash + commit SHA (exact match)
    #   - Fallback: OS + go.sum hash (same deps, different code)
    #   - Fallback: OS only (partial cache, still helps)
    # -------------------------------------------------------------------------
    - name: Cache Go build artifacts
      uses: actions/cache@v4
      with:
        path: ~/.cache/go-build
        key: go-build-${{ runner.os }}-${{ hashFiles('go.sum') }}-${{ github.sha }}
        restore-keys: |
          go-build-${{ runner.os }}-${{ hashFiles('go.sum') }}-
          go-build-${{ runner.os }}-
