# =============================================================================
# golangci-lint configuration for VPN Manager (v2 format)
# =============================================================================
# Balanced configuration: catches real issues without being overly pedantic.
# Focused on security, correctness, and maintainability.
#
# Documentation: https://golangci-lint.run/usage/configuration/
# =============================================================================

version: "2"

run:
  # 15m timeout: gotk4 CGO bindings require compilation before analysis.
  # On cold cache, go/packages.Load() can take 5-8 minutes for gotk4.
  # This matches the timeout in .github/workflows/ci.yml
  timeout: 15m
  tests: true

output:
  formats:
    text:
      path: stdout
      colors: true

linters:
  default: standard